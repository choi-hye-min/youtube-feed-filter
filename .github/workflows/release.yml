name: Release Build

on:
  release:
    types: [published] # 릴리즈가 발행될 때 실행

jobs:
  build:
    name: Zip and Upload Asset
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get install zip

      - name: Create Extension Zip
        run: |
          # src 폴더 내부의 파일들과 README.md를 포함하여 압축
          # -r: 하위 폴더 포함, -j: 최상위 폴더 경로 무시 (src 내부 파일만 담기 위해)
          cd src && zip -r ../youtube-feed-filter-extension.zip . *
          cd .. && zip -u youtube-feed-filter-extension.zip README.md

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: youtube-feed-filter-extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
