<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>YouTube Feed Filter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="popup-container">
        <h1>YOUTUBE SKIP</h1>
        
        <div id="filter-control">
            <label for="threshold-select">Filter Older Than</label>
            <select id="threshold-select">
                <option value="">-- Choose Threshold --</option>
                <option value="1week">1 Week</option>
                <option value="2weeks">2 Weeks</option>
                <option value="1month">1 Month</option>
                <option value="3months">3 Months</option>
                <option value="6months">6 Months</option>
            </select>
        </div>
        
        <div id="toggles-container" style="display: flex; flex-direction: column; gap: 4px;">
            <div id="filter-toggle">
                <label for="enable-filter">
                    <input type="checkbox" id="enable-filter" checked>
                    Enable Filtering
                </label>
            </div>

            <div id="logging-toggle">
                <label for="enable-logging">
                    <input type="checkbox" id="enable-logging">
                    Debug Logging
                </label>
            </div>
        </div>

        <div id="stats-container">
            <div class="stat-row">
                <span>Detected</span>
                <span id="detected-count">0</span>
            </div>
            <div class="stat-row">
                <span>Skipped</span>
                <span id="skipped-count">0</span>
            </div>
        </div>

        <div id="skipped-list-container">
            <h2>Recent Activity</h2>
            <ul id="skipped-list">
                <!-- Videos will appear here -->
            </ul>
        </div>
        
        <div id="status"></div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
