name: Auto Release Build

on:
  push:
    tags:
      - 'release-*' # release-v1.0.0 과 같은 태그가 푸시될 때 실행

jobs:
  build:
    name: Create Release and Upload Asset
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get install zip

      - name: Create Extension Zip
        run: |
          # src 폴더 내부의 파일들과 README.md를 포함하여 압축
          cd src && zip -r ../youtube-feed-filter-extension.zip . *
          cd .. && zip -u youtube-feed-filter-extension.zip README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: youtube-feed-filter-extension.zip
          name: Release ${{ github.ref_name }} # 태그 이름을 릴리즈 제목으로 사용
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
          generate_release_notes: true # 자동으로 변경 사항 요약 생성
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
