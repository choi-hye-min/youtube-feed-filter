<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>YouTube Feed Filter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="popup-container">
        <h1>YouTube Feed Filter</h1>
        
        <div id="filter-control">
            <label for="threshold-select">Time Threshold:</label>
            <select id="threshold-select">
                <option value="">-- Select a threshold --</option>
                <option value="1week">1 week</option>
                <option value="2weeks">2 weeks</option>
                <option value="1month">1 month</option>
                <option value="3months">3 months</option>
                <option value="6months">6 months</option>
            </select>
        </div>
        
        <div id="filter-toggle">
            <label for="enable-filter">
                <input type="checkbox" id="enable-filter" checked>
                Enable Filter
            </label>
        </div>

        <div id="logging-toggle" style="margin-top: 5px;">
            <label for="enable-logging">
                <input type="checkbox" id="enable-logging">
                Enable Console Logs
            </label>
        </div>

        <div id="stats-container" style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee;">
            <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px;">
                <span>Detected Videos:</span>
                <span id="detected-count" style="font-weight: bold;">0</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 13px;">
                <span>Skipped Videos:</span>
                <span id="skipped-count" style="font-weight: bold; color: #d93025;">0</span>
            </div>
        </div>
        
        <div id="status" style="margin-top: 10px; font-size: 12px; color: #666;"></div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
